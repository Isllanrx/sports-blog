<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Leia as postagens do Blog de Esportes." />
    <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Postagens - Blog de Esportes</title>

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/postagens.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,500,0,0" />

    <script src="/js/base.js" defer></script>
    <script src="/js/post.js" defer></script>
  </head>
  <body>
    <main class="article-container">
      <nav class="article-nav">
        <a href="/pages/noticias.html" class="back-link">
          <span class="material-symbols-outlined">arrow_back</span>
          Voltar para Notícias
        </a>
      </nav>

      <article class="article-content">
        <header class="article-header">
          <span id="article-badge" class="badge">Esporte</span>
          <span id="article-date" class="article-date"></span>
          <h1 id="titulo">Carregando...</h1>
        </header>
        
        <div id="corpo" class="article-body">
          <!-- Conteúdo injetado via JS -->
        </div>
      </article>
    </main>
  </body>
</html>
