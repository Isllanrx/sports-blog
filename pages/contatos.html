<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Entre em contato com o Blog de Esportes." />
    <link rel="icon" href="/assets/icons/favicon.ico" type="image/x-icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Contatos - Blog de Esportes</title>

    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/contatos.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;500;600&family=Poppins:wght@400;500;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0&display=swap" />

    <script src="/js/base.js" defer></script>
    <script src="/js/contatos.js" defer></script>
  </head>
  <body>
    <main class="contact-main">
      <div class="contact container">
        <div class="contact wrapper">
          <form class="contact form" id="contact-form" novalidate>
            <div class="contact header">
              <h1>Contato</h1>
            </div>
            <div class="contact item first-name">
              <label for="fname">Nome</label>
              <input type="text" id="fname" name="fname" required placeholder="Seu nome">
            </div>
            <div class="contact item last-name">
              <label for="lname">Sobrenome</label>
              <input type="text" id="lname" name="lname" required placeholder="Seu sobrenome">
            </div>
            <div class="contact item email">
              <label for="email">E-mail</label>
              <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
            </div>
            <div class="contact item message">
              <label for="message">Mensagem</label>
              <textarea id="message" name="message" rows="5" required placeholder="Como podemos ajudar?"></textarea>
            </div>
            <div class="contact item submit">
              <button type="submit">Enviar Mensagem</button>
            </div>
            <p class="contact success" id="contact-success" aria-live="polite" hidden>
              Mensagem enviada com sucesso! Entraremos em contato em breve.
            </p>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
